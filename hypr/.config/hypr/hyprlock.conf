general {
  hide_cursor = true
  grace = 2
}

# --- Background: blur your current wallpaper/screen ---
background {
  monitor =
  path = screenshot
  blur_passes = 3
  blur_size = 8
  noise = 0.02
  contrast = 1.05
  brightness = 0.80
  vibrancy = 0.20
  vibrancy_darkness = 0.0
}

# --- Clock (big) ---
label {
  monitor =
  text = cmd[update:1000] date +"%I:%M %p"
  font_size = 64
  font_family = JetBrainsMono Nerd Font
  color = rgba(255, 255, 255, 1.0)

  position = 0, 140
  halign = center
  valign = center

  shadow_passes = 2
  shadow_size = 4
}

# --- Date (smaller under clock) ---
label {
  monitor =
  text = cmd[update:60000] date +"%A, %B %d"
  font_size = 22
  font_family = JetBrainsMono Nerd Font
  color = rgba(255, 255, 255, 0.85)

  position = 0, 70
  halign = center
  valign = center
}

# --- Password box ---
input-field {
  monitor =
  size = 360, 52
  outline_thickness = 2
  rounding = 14

  fade_on_empty = false
  placeholder_text = Enter password...
  dots_center = true

  font_family = JetBrainsMono Nerd Font
  font_size = 18

  # Colors (simple, readable, looks good with blur)
  outer_color = rgba(255, 255, 255, 0.30)
  inner_color = rgba(0, 0, 0, 0.35)
  font_color = rgba(255, 255, 255, 1.0)
  check_color = rgba(0, 255, 128, 0.35)
  fail_color = rgba(255, 80, 80, 0.35)

  position = 0, -40
  halign = center
  valign = center
}
